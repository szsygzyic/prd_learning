<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设计思维工坊 · 硬件创作</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --navy: #1a2a40; --navy-light: #243550; --navy-dark: #0d1b2a;
  --orange: #e67e22; --orange-light: #f5af4f; --orange-dark: #c96a1c;
  --gold: #f0a030;
  --green: #2ecc71; --green-dark: #27ae60;
  --bg: #eef2f7; --card: #ffffff; --text: #2c3e50; --text-light: #7f8c8d;
  --border: #dde3ea;
  --shadow: 0 4px 20px rgba(26,42,64,0.10);
  --radius: 16px; --radius-sm: 12px;
  --circuit-color: #bcc8d6;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); background-image:
    radial-gradient(circle at 20% 20%, rgba(26,42,64,0.03) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(230,126,34,0.04) 0%, transparent 50%);
  min-height: 100vh; color: var(--text); line-height: 1.6;
}
.container { max-width: 720px; margin: 0 auto; padding: 20px; }

/* Header */
.header { text-align: center; padding: 28px 0 14px; position: relative; }
.header .icon { font-size: 44px; display: block; animation: pulse 2s infinite; }
.header h1 { font-size: 26px; font-weight: 800; margin-bottom: 4px; color: var(--navy); }
.header h1 span { color: var(--orange); }
.header .sub { font-size: 13px; color: var(--text-light); }
.header .sub a { color: var(--navy); font-weight: 600; text-decoration: none; margin: 0 4px; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

/* Phase bar */
.phase-bar { display: flex; gap: 6px; margin-bottom: 20px; align-items: center; }
.phase-step { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.phase-dot-wrap { width: 100%; height: 4px; background: var(--border); border-radius: 2px; transition: all .4s; overflow: hidden; }
.phase-dot-fill { height: 100%; width: 0; transition: width .5s ease; border-radius: 2px; }
.phase-step.active .phase-dot-fill { width: 100%; background: linear-gradient(90deg, var(--navy), var(--orange)); }
.phase-step.done .phase-dot-fill { width: 100%; background: var(--green); }
.phase-label { font-size: 11px; color: var(--text-light); transition: color .3s; }
.phase-step.active .phase-label { color: var(--navy); font-weight: 700; }
.phase-step.done .phase-label { color: var(--green); }

/* Main card */
.main { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 28px; min-height: 340px; border-top: 3px solid var(--navy); }

/* Messages */
.msg { animation: fadeIn .4s ease; margin-bottom: 22px; }
.msg-ai { display: flex; gap: 10px; align-items: flex-start; }
.msg-ai .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--navy); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(26,42,64,.2); }
.msg-ai .bubble { background: #f0f4fa; border-radius: 16px 16px 16px 4px; padding: 14px 18px; max-width: 560px; font-size: 14px; line-height: 1.7; }
.msg-ai .bubble strong { color: var(--navy); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* Scenario grid */
.cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 10px; margin: 16px 0; }
.cat-card { background: #fafbfc; border: 2px solid var(--border); border-radius: var(--radius-sm); padding: 16px 10px; cursor: pointer; text-align: center; transition: all .3s; }
.cat-card:hover { border-color: var(--orange); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(230,126,34,.12); }
.cat-card.selected { border-color: var(--orange); background: #fff8f0; box-shadow: 0 0 0 3px rgba(230,126,34,.15); }
.cat-card.disabled { opacity: .35; pointer-events: none; }
.cat-card .ci { font-size: 30px; display: block; margin-bottom: 5px; }
.cat-card .cn { font-size: 13px; font-weight: 700; display: block; color: var(--navy); margin-bottom: 2px; }
.cat-card .cd { font-size: 11px; color: var(--text-light); }
.cat-count { font-size: 13px; color: var(--text-light); text-align: center; margin-bottom: 8px; }

/* Choice cards */
.choice-list { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
.choice-card { background: #fafbfc; border: 2px solid var(--border); border-radius: var(--radius-sm); padding: 14px 18px; cursor: pointer; transition: all .3s; display: flex; align-items: center; gap: 12px; }
.choice-card:hover { border-color: var(--navy); background: #f0f4fa; }
.choice-card.selected { border-color: var(--navy); background: #eaf0f9; }
.choice-dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #ccc; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; }
.choice-card.selected .choice-dot { background: var(--navy); border-color: var(--navy); }
.choice-text { font-size: 14px; color: var(--text); }

/* Check list */
.check-list { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
.check-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; background: #fafbfc; border: 2px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; transition: all .3s; }
.check-item:hover { border-color: var(--navy); background: #f0f4fa; }
.check-item.selected { border-color: var(--orange); background: #fff8f0; }
.check-box { width: 20px; height: 20px; border-radius: 4px; border: 2px solid #ccc; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; margin-top: 2px; }
.check-item.selected .check-box { background: var(--orange); border-color: var(--orange); }
.check-label { font-size: 14px; color: var(--text); line-height: 1.5; flex: 1; }
.check-label .pri { font-weight: 700; margin-right: 4px; }
.check-label .pri.p0 { color: var(--orange); }
.check-label .pri.p1 { color: var(--navy); }
.check-label .pri.p2 { color: var(--text-light); }

/* Text input */
.text-input { width: 100%; margin-top: 14px; padding: 12px 16px; border: 2px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; color: var(--text); background: #fafbfc; min-height: 80px; resize: vertical; transition: all .3s; }
.text-input:focus { outline: none; border-color: var(--navy); background: #fff; box-shadow: 0 0 0 4px rgba(26,42,64,.08); }

/* Result block */
.result-block { background: #fafbfc; border-radius: var(--radius-sm); padding: 20px; margin: 16px 0; border: 2px solid var(--border); border-left: 4px solid var(--navy); }
.result-block h2 { font-size: 18px; margin-bottom: 12px; color: var(--navy); }
.result-block .body { font-size: 14px; line-height: 1.8; color: var(--text); }
.result-block .body h3 { font-size: 15px; margin: 12px 0 6px; color: var(--navy); }
.result-block .body ul,.result-block .body ol { margin: 6px 0 6px 18px; }
.result-block .body code { background: #2c3e50; color: #ecf0f1; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
.result-block .body pre { background: #2c3e50; color: #ecf0f1; padding: 12px 14px; border-radius: 10px; overflow-x: auto; font-size: 13px; line-height: 1.6; margin: 8px 0; }
.result-block .body pre code { background: none; padding: 0; }
.result-block .body table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
.result-block .body th, .result-block .body td { border: 1px solid #ddd; padding: 8px 10px; text-align: left; }
.result-block .body th { background: #eaf0f9; font-weight: 700; color: var(--navy); }
.result-block .body tr:nth-child(even) { background: #fafbfc; }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 24px; border-radius: 50px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; transition: all .3s; font-family: inherit; }
.btn-primary { background: linear-gradient(135deg, var(--navy), var(--navy-light)); color: #fff; box-shadow: 0 4px 14px rgba(26,42,64,.25); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,42,64,.35); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.btn-ai { background: linear-gradient(135deg, var(--orange), var(--orange-dark)); color: #fff; box-shadow: 0 4px 14px rgba(230,126,34,.3); }
.btn-ai:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(230,126,34,.4); }
.btn-copy { background: linear-gradient(135deg, var(--green), var(--green-dark)); color: #fff; }
.btn-outline { background: #fff; color: var(--navy); border: 2px solid var(--navy); }
.btn-outline:hover { background: #f0f4fa; }
.btn-small { padding: 6px 14px; font-size: 12px; }
.btn-group { display: flex; gap: 10px; margin-top: 18px; justify-content: center; flex-wrap: wrap; }

.loading { text-align: center; padding: 30px; color: var(--text-light); }
.loading .spinner { font-size: 32px; animation: spin 1s linear infinite; display: inline-block; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* Toast */
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--navy); color: #fff; padding: 10px 24px; border-radius: 50px; font-size: 13px; font-weight: 600; z-index: 999; animation: toastIn .3s ease, toastOut .3s ease 1.5s forwards; pointer-events: none; }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-16px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

/* Wiring table */
.wire-table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; font-family: "SF Mono", "Menlo", "Consolas", monospace; }
.wire-table th { background: var(--navy); color: #fff; padding: 8px 12px; text-align: left; font-size: 12px; }
.wire-table td { padding: 8px 12px; border: 1px solid var(--border); }
.wire-table tr:nth-child(even) td { background: #fafbfc; }

/* Circuit decoration */
.circuit-line { position: absolute; pointer-events: none; opacity: .15; }
.header { position: relative; overflow: hidden; }

/* Eval block */
.eval-block { background: linear-gradient(135deg, #fff8f0, #fff); border: 2px solid var(--orange-light); border-radius: var(--radius-sm); padding: 24px; margin: 16px 0; text-align: center; }
.eval-block .score { font-size: 48px; font-weight: 800; color: var(--orange); }
.eval-block .stars { font-size: 28px; margin: 4px 0; }

.footer { text-align: center; padding: 20px; color: var(--text-light); font-size: 12px; }
.footer span { color: var(--navy); font-weight: 600; }

/* Industry tag */
.industry-tag { display: inline-block; background: var(--navy); color: #fff; padding: 3px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; margin-bottom: 12px; letter-spacing: 1px; }

/* Design dimension card */
.design-dim-card { transition: all .3s; }
.design-dim-card:hover { border-color: var(--orange) !important; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(230,126,34,.12); }
.design-dim-card.improved { background: #f0fff4 !important; }

@media (max-width: 640px) {
  .main { padding: 20px 16px; }
  .header h1 { font-size: 22px; }
  .cat-grid { grid-template-columns: repeat(auto-fill, minmax(114px,1fr)); gap: 8px; }
}
</style>
</head>

<script>
// ═══ API Configuration ═══
const API_URL = 'https://api.deepseek.com/chat/completions';
const MODEL_FLASH = 'deepseek-v4-flash';
const MODEL_PRO = 'deepseek-v4-pro';
const LS_KEY = 'hw_design_thinking_ds_key';
function getApiKey() { return localStorage.getItem(LS_KEY) || ''; }
function setApiKey(k) { localStorage.setItem(LS_KEY, k); }
function hasApiKey() { const k = getApiKey(); return k && k.startsWith('sk-'); }

async function callAI(prompt, model) {
  const key = getApiKey();
  if (!key || !key.startsWith('sk-')) throw new Error('请先配置 API Key');
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getApiKey()}` },
    body: JSON.stringify({ model: model || MODEL_FLASH, messages: [{ role: 'user', content: prompt }], stream: false, temperature: 0.7 })
  });
  if (!res.ok) throw new Error('API 错误: ' + res.status);
  const data = await res.json();
  const content = data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content;
  if (!content) throw new Error('AI 没有返回内容');
  return content;
}

// ═══ DESIGN Dimensions (hardware adapted) ═══
const DESIGN_DIMS = [

function cleanTitle(title) {
  return String(title || '').replace(/\*\*/g, '').replace(/\*/g, '').replace(/_/g, '').trim();
}

function parseQuestions(text) {
  const qs = [];
  const regex = /题\s*\d+\s*[：:]([\s\S]*?)(?=题\s*\d+\s*[：:]|$)/g;
  let m;
  while ((m = regex.exec(text)) !== null) {
    const body = m[1].trim();
    const lines = body.split('\n').filter(l => l.trim());
    const title = cleanTitle(lines[0] || '');
    const opts = [];
    for (let i = 1; i < lines.length; i++) {
      const om = lines[i].match(/^([A-C])[\.\、\s：:]*\s*(.+)/);
      if (om) opts.push({ key: om[1], text: cleanTitle(om[2].trim()) });
    }
    if (title && opts.length > 0) qs.push({ title, opts });
  }
  if (qs.length === 0) {
    const parts = text.split(/\n{2,}/).filter(p => p.trim());
    parts.forEach(part => {
      const lines = part.split('\n').filter(l => l.trim());
      const title = cleanTitle(lines[0] || '请选择一个选项');
      const opts = [];
      for (let i = 1; i < lines.length; i++) {
        const om = lines[i].match(/^([A-C])[\.\、\s：:]*\s*(.+)/);
        if (om) opts.push({ key: om[1], text: cleanTitle(om[2].trim()) });
      }
      if (opts.length > 0) qs.push({ title, opts });
    });
  }
  return qs.slice(0, 5);
}

  }

  main.innerHTML = `<div class="loading"><span class="spinner">🔍</span><p>小P 正在检查你们的调研质量……</p></div>`;

  try {
    const prompt = `请评价学生小组提交的调研结果和初步方案。10分制。

学生年级：${STATE.ageGroup?.label || '中小学'}
创作方向：${STATE.allContext.scenario}

学生调研结果：
${STATE.researchNotes}

- 调研是否具体（0-4分）：有没有真实观察、采访、查资料？
- 与方向相关性（0-3分）：调研和核心问题是否相关？
- 初步方案是否清晰（0-3分）：有没有说清用户、问题、可能用什么硬件？

请按${STATE.ageGroup?.label || '学生'}水平评价，不要以大学生或专业研究者标准要求。

输出格式：
得分：X/10
评语：一句话

建议：如果低于7分，给一个具体改进方向

注意：不要出现 Markdown 加粗符号（如 **）。`;

    const result = await callAI(prompt);
    const scoreM = result.match(/得分[：:]\s*(\d+)/);

  }

function parseFeatureData(text) {
  const featM = (text || '').match(/\[功能选择题\]([\s\S]*?)(?=\[额外|$)/i);
  const extraM = (text || '').match(/\[额外创意\]([\s\S]*?)$/i);
  const features = [];
  if (featM && featM[1]) {
    const lines = featM[1].split('\n');
    for (const l of lines) {
      const fm = l.match(/^\s*\[(P\d)\]\s*(.+)$/i);
      if (fm) features.push({ priority: fm[1], text: cleanTitle(fm[2].trim()) });
    }
  }
  const extras = [];
  if (extraM && extraM[1]) {
    const lines = extraM[1].split('\n');
    for (const l of lines) {
      const em = l.match(/^[-•]\s*(.+)/);
      if (em) extras.push(cleanTitle(em[1].trim()));
    }
  }
  if (features.length === 0) {
    features.push({ priority: 'P0', text: 'AI语音对话（推荐硬件：INMP441麦克风 + ESP32-S3扬声器）' });
  }
  return { features, extras };
}

function toggleFeat(i, el) {
  if (window._selFeat.has(i)) { window._selFeat.delete(i); el.classList.remove('selected'); }
  else { window._selFeat.add(i); el.classList.add('selected'); }
}

function addCustomFeature() {
  const d = document.createElement('div');
  d.style.cssText = 'margin-top:8px;display:flex;gap:8px;';
  d.innerHTML = `<input type="text" class="text-input" style="min-height:auto;flex:1;margin-top:0;" placeholder="自定义功能名称"><select style="padding:8px;border-radius:8px;border:2px solid var(--border);font-family:inherit;"><option>P0</option><option selected>P1</option><option>P2</option></select><button class="btn btn-outline btn-small" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById('customFeatures').appendChild(d);
}

function confirmFeatures() {
  const customInputs = document.querySelectorAll('#customFeatures input[type="text"]');
  const customSel = document.querySelectorAll('#customFeatures select');
  const customFeats = [];
  for (let i = 0; i < customInputs.length; i++) {
    if (customInputs[i].value.trim()) {
      customFeats.push({ priority: customSel[i]?.value || 'P1', text: customInputs[i].value.trim() });
    }
  }
  const selFeats = [];
  window._selFeat.forEach(i => selFeats.push(window._featData[i]));
  const allFeats = [...selFeats, ...customFeats];
  if (allFeats.length === 0) { showToast('请至少选一个功能'); return; }
  STATE.selectedFeatures = allFeats;
  STATE.allContext.features = allFeats.map(f => `[${f.priority}] ${f.text}`).join('\n');
  STATE.phase = 5;
  renderDesignEval();
}

function parseSolution(text) {
  const t = String(text || '');

  const thinkingM = t.match(/\[一、我们的思考之路\]([\s\S]*?)(?=\[二|$)/);

  const techM = t.match(/\[三、技术实现\]([\s\S]*?)$/);
  sections.thinking = thinkingM && thinkingM[1] ? thinkingM[1].trim() : '';
  sections.design = designM && designM[1] ? designM[1].trim() : '';
  sections.tech = techM && techM[1] ? techM[1].trim() : '';
  return sections;
}

function parseTechSection(text) {
  const t = String(text || '');
  const sections = {};
  const bomM = t.match(/###\s*硬件清单([\s\S]*?)(?=###\s*接线表|$)/);
  const wiringM = t.match(/###\s*接线表([\s\S]*?)(?=###\s*编程思路|$)/);
  const progM = t.match(/###\s*编程思路([\s\S]*?)$/);
  sections.bom = bomM && bomM[1] ? bomM[1].trim() : '';
  sections.wiring = wiringM && wiringM[1] ? wiringM[1].trim() : '';
  sections.programming = progM && progM[1] ? progM[1].trim() : '';
  return sections;
}

async function copyToClipboard(text) {

  catch { const ta = document.createElement('textarea'); ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }
}

    ];
    STATE.phase = 2;
    STATE.allContext.answers = STATE.userAnswers.map((a, i) => `Q: ${STATE.questions[i].title}\nA: ${a.text}`).join('\n');
    renderPhase2();
    showToast('🔧 已跳过思辨问答');
  } else {
    showToast('🔧 当前阶段没有可跳过的检查');
  }
}

// ═══ Init ═══
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('brainIcon').addEventListener('click', brainBackdoor);
});
renderAgeSelect();
</script>
