<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRD 思辨工坊 - 深度思考引导</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --pink: #ff6b9d; --purple: #c471ed; --blue: #667eea; --teal: #12c2e9;
  --orange: #f5af19; --green: #43e97b; --bg: #fef9ff; --card: #ffffff;
  --text: #2d3436; --text-light: #636e72;
  --shadow: 0 4px 20px rgba(149,117,205,0.12);
  --radius: 20px; --radius-sm: 14px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #fef9ff, #f0e6ff, #e8f4fd);
  min-height: 100vh; color: var(--text); line-height: 1.6;
}
.container { max-width: 720px; margin: 0 auto; padding: 20px; }

/* Header */
.header { text-align: center; padding: 30px 0 16px; }
.header .icon { font-size: 48px; display: block; animation: bounce 2s infinite; }
.header h1 { font-size: 26px; font-weight: 800; margin-bottom: 4px;
  background: linear-gradient(135deg, var(--pink), var(--purple), var(--blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.header .sub { font-size: 13px; color: var(--text-light); }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

/* Phase indicator */
.phase-bar { display: flex; gap: 6px; margin-bottom: 20px; }
.phase-dot { flex: 1; height: 4px; background: #e0e0e0; border-radius: 2px; transition: all .4s; }
.phase-dot.active { background: linear-gradient(90deg, var(--pink), var(--purple)); }
.phase-dot.done { background: var(--green); }

/* Main card */
.main { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 32px 28px; min-height: 360px; }

/* Chat-like messages */
.msg { animation: fadeIn .4s ease; margin-bottom: 24px; }
.msg-ai { display: flex; gap: 10px; align-items: flex-start; }
.msg-ai .avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, var(--pink), var(--purple)); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.msg-ai .bubble { background: #f8f0ff; border-radius: 16px 16px 16px 4px; padding: 14px 18px; max-width: 560px; font-size: 14px; line-height: 1.7; }
.msg-ai .bubble strong { color: var(--purple); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* Category grid */
.cat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); gap: 10px; margin: 16px 0; }
.cat-card { background: #fafafa; border: 2px solid #e8e8e8; border-radius: 14px; padding: 14px 8px; cursor: pointer; text-align: center; transition: all .3s; }
.cat-card:hover { border-color: var(--purple); transform: translateY(-2px); }
.cat-card.selected { border-color: var(--purple); background: #f3e8ff; box-shadow: 0 0 0 3px rgba(196,113,237,.15); }
.cat-card.disabled { opacity: .35; pointer-events: none; }
.cat-card .ci { font-size: 26px; display: block; margin-bottom: 4px; }
.cat-card .cn { font-size: 12px; font-weight: 600; }
.cat-count { font-size: 13px; color: var(--text-light); text-align: center; margin-bottom: 8px; }

/* Choice cards */
.choice-list { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
.choice-card { background: #fafafa; border: 2px solid #e8e8e8; border-radius: var(--radius-sm); padding: 14px 18px; cursor: pointer; transition: all .3s; display: flex; align-items: center; gap: 12px; }
.choice-card:hover { border-color: var(--purple); background: #f3e8ff; }
.choice-card.selected { border-color: var(--purple); background: #f3e8ff; }
.choice-dot { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #ccc; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; }
.choice-card.selected .choice-dot { background: var(--purple); border-color: var(--purple); }
.choice-text { font-size: 14px; color: var(--text); }

/* Multi select for features */
.check-list { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
.check-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 14px; background: #fafafa; border: 2px solid #e8e8e8; border-radius: 12px; cursor: pointer; transition: all .3s; }
.check-item:hover { border-color: var(--purple); background: #f8f0ff; }
.check-item.selected { border-color: var(--purple); background: #f0e4ff; }
.check-box { width: 20px; height: 20px; border-radius: 5px; border: 2px solid #ccc; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; margin-top: 2px; }
.check-item.selected .check-box { background: var(--purple); border-color: var(--purple); }
.check-label { font-size: 14px; color: var(--text); line-height: 1.5; flex: 1; }
.check-label .pri { color: var(--purple); font-weight: 600; margin-right: 4px; }

/* Text input */
.text-input { width: 100%; margin-top: 14px; padding: 12px 16px; border: 2px solid #e8e8e8; border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; color: var(--text); background: #fafafa; min-height: 80px; resize: vertical; transition: all .3s; }
.text-input:focus { outline: none; border-color: var(--purple); background: #fff; box-shadow: 0 0 0 4px rgba(196,113,237,.1); }

/* Research block */
.research-block { background: #fef9e6; border: 2px solid #ffe082; border-radius: var(--radius-sm); padding: 18px; margin: 16px 0; }
.research-block h3 { font-size: 15px; margin-bottom: 8px; color: var(--text); }
.research-block .kw { display: inline-block; background: #fff; border: 1px solid #ffe082; border-radius: 20px; padding: 4px 12px; font-size: 13px; margin: 3px 4px 3px 0; color: var(--text); }
.research-block .link { display: block; font-size: 13px; color: var(--blue); margin: 4px 0; text-decoration: underline; word-break: break-all; }

/* Result */
.result-block { background: #fafafa; border-radius: var(--radius-sm); padding: 20px; margin: 16px 0; border: 2px solid #f0f0f0; }
.result-block h2 { font-size: 18px; margin-bottom: 12px; color: var(--purple); }
.result-block .body { font-size: 14px; line-height: 1.8; color: var(--text); }
.result-block .body h3 { font-size: 15px; margin: 12px 0 6px; }
.result-block .body ul,.result-block .body ol { margin: 6px 0 6px 18px; }
.result-block .body code { background: #2d3436; color: #dfe6e9; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
.result-block .body pre { background: #2d3436; color: #dfe6e9; padding: 12px 14px; border-radius: 10px; overflow-x: auto; font-size: 13px; line-height: 1.6; margin: 8px 0; }
.result-block .body pre code { background: none; padding: 0; }
.result-block .body table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
.result-block .body th, .result-block .body td { border: 1px solid #ddd; padding: 8px 10px; text-align: left; }
.result-block .body th { background: #f3e8ff; font-weight: 600; }
.result-block .body tr:nth-child(even) { background: #fafafa; }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 24px; border-radius: 50px; font-size: 14px; font-weight: 600; border: none; cursor: pointer; transition: all .3s; font-family: inherit; }
.btn-primary { background: linear-gradient(135deg, var(--pink), var(--purple)); color: #fff; box-shadow: 0 4px 14px rgba(255,107,157,.25); }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,157,.35); }
.btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.btn-ai { background: linear-gradient(135deg, var(--orange), #ff6b6b); color: #fff; }
.btn-copy { background: linear-gradient(135deg, var(--teal), var(--blue)); color: #fff; }
.btn-outline { background: #fff; color: var(--purple); border: 2px solid var(--purple); }
.btn-outline:hover { background: #f3e8ff; }
.btn-small { padding: 6px 14px; font-size: 12px; }
.btn-group { display: flex; gap: 10px; margin-top: 18px; justify-content: center; flex-wrap: wrap; }

.loading { text-align: center; padding: 30px; color: var(--text-light); }
.loading .spinner { font-size: 32px; animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

/* Toast */
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #2d3436; color: #fff; padding: 10px 24px; border-radius: 50px; font-size: 13px; font-weight: 600; z-index: 999; animation: toastIn .3s ease, toastOut .3s ease 1.5s forwards; pointer-events: none; }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-16px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

.footer { text-align: center; padding: 20px; color: var(--text-light); font-size: 12px; }

@media (max-width: 640px) {
  .main { padding: 24px 18px; }
  .header h1 { font-size: 22px; }
  .cat-grid { grid-template-columns: repeat(auto-fill, minmax(100px,1fr)); gap: 8px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <span class="icon" id="brainIcon" style="cursor:pointer;" title="测试后门：点击跳过当前检查">🧠</span>
    <h1>PRD 思辨工坊</h1>
    <p class="sub">先思考，再求助AI —— 小P引导你深度构思产品</p>
    <a href="prd-intro.html" target="_blank" rel="noopener noreferrer" style="display:inline-block;margin-top:8px;padding:6px 16px;background:#fff;border:2px solid var(--purple);color:var(--purple);border-radius:50px;font-size:12px;font-weight:600;text-decoration:none;transition:all .3s;">📖 先看 PRD 介绍</a>
  </div>

  <div class="phase-bar" id="phaseBar"></div>
  <div class="main" id="mainContent"></div>
  <div class="footer">PRD 思辨工坊 · 深度思考引导模式 · <a href="javascript:void(0)" onclick="resetAll()" style="color:var(--text-light);">🔄 重新开始</a></div>
</div>

<script>
// ═══ API ═══
const API_URL = 'https://api.deepseek.com/chat/completions';
const MODEL_FLASH = 'deepseek-v4-flash';
const MODEL_PRO = 'deepseek-v4-pro';
const LS_KEY = 'prd_thinking_ds_key';
function getApiKey() { return localStorage.getItem(LS_KEY) || 'sk-f0527cfcf9c14c54892818cc37dc45bd'; }
function setApiKey(k) { localStorage.setItem(LS_KEY, k); }
function hasApiKey() { const k = getApiKey(); return k && k.startsWith('sk-'); }

async function callAI(prompt, model) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getApiKey()}` },
    body: JSON.stringify({ model: model || MODEL_FLASH, messages: [{ role: 'user', content: prompt }], stream: false, temperature: 0.7 })
  });
  if (!res.ok) throw new Error('API 错误: ' + res.status);
  const data = await res.json();
  return data.choices[0].message.content;
}

// ═══ State persistence ═══
const SAVE_KEY = 'prd_thinking_state';
function saveState() {
  const data = {
    phase: STATE.phase,
    ageGroupId: STATE.ageGroup?.id || null,
    cats: STATE.cats,
    questions: STATE.questions,
    questionIdx: STATE.questionIdx,
    userAnswers: STATE.userAnswers,
    researchNotes: STATE.researchNotes,
    researchData: STATE.researchData,
    featureData: STATE.featureData,
    selectedFeatures: STATE.selectedFeatures,
    coreAnswer: STATE.coreAnswer,
    prdText: STATE.prdText,
    techSteps: STATE.techSteps,
    designScores: STATE.designScores,
    designOverall: STATE.designOverall,
    reviewSummary: STATE.reviewSummary,
    improvedDims: Array.from(STATE._improvedDims || []),
    improvQuestions: STATE._improvQuestions,
    improvDim: STATE._improvDim,
    improvIdx: STATE._improvIdx,
    improvAnswers: STATE._improvAnswers,
    improvMode: STATE._improvMode,
    allContext: STATE.allContext,
    featData: window._featData || [],
    selFeat: Array.from(window._selFeat || []),
    teModules: window._teModules || [],
  };
  localStorage.setItem(SAVE_KEY, JSON.stringify(data));
}

function loadState() {
  const raw = localStorage.getItem(SAVE_KEY);
  if (!raw) return false;
  try {
    const data = JSON.parse(raw);
    STATE.phase = data.phase || 0;
    STATE.ageGroup = data.ageGroupId ? AGE_GROUPS.find(g => g.id === data.ageGroupId) : null;
    STATE.cats = data.cats || [];
    STATE.questions = data.questions || [];
    STATE.questionIdx = data.questionIdx || 0;
    STATE.userAnswers = data.userAnswers || [];
    STATE.researchNotes = data.researchNotes || '';
    STATE.researchData = data.researchData || null;
    STATE.featureData = data.featureData || null;
    STATE.selectedFeatures = data.selectedFeatures || [];
    STATE.coreAnswer = data.coreAnswer || null;
    STATE.prdText = data.prdText || '';
    STATE.techSteps = data.techSteps || [];
    STATE.designScores = data.designScores || null;
    STATE.designOverall = data.designOverall || null;
    STATE.reviewSummary = data.reviewSummary || null;
    STATE._improvedDims = new Set(data.improvedDims || []);
    STATE._improvQuestions = data.improvQuestions || [];
    STATE._improvDim = data.improvDim || null;
    STATE._improvIdx = data.improvIdx || 0;
    STATE._improvAnswers = data.improvAnswers || [];
    STATE._improvMode = data.improvMode || null;
    STATE.allContext = data.allContext || {};
    window._featData = data.featData || [];
    window._selFeat = new Set(data.selFeat || []);
    window._teModules = data.teModules || [];
    return true;
  } catch (e) {
    console.error('loadState failed', e);
    return false;
  }
}

function clearSavedState() {
  localStorage.removeItem(SAVE_KEY);
}

// ═══ Categories ═══
const CATS = [
  { id:'social', icon:'🗣️', name:'社交沟通' }, { id:'homework', icon:'📝', name:'作业学习' },
  { id:'parenting', icon:'👨‍👩‍👧', name:'亲子互动' }, { id:'sport', icon:'🏃', name:'运动健身' },
  { id:'food', icon:'🥗', name:'饮食健康' }, { id:'reduce', icon:'♻️', name:'减少浪费' },
  { id:'water', icon:'💧', name:'节约用水' }, { id:'animal', icon:'🐾', name:'保护动物' },
  { id:'community', icon:'🤝', name:'社区公益' }, { id:'eco', icon:'🌍', name:'环保行动' },
  { id:'campus', icon:'🏫', name:'校园服务' }, { id:'club', icon:'🎨', name:'兴趣社团' },
];

// ═══ Age groups ═══
const AGE_GROUPS = [
  { id:'p34', label:'小学 3-4 年级', age:'9-10岁', desc:'具体形象思维为主' },
  { id:'p56', label:'小学 5-6 年级', age:'11-12岁', desc:'开始抽象思考，关注同伴' },
  { id:'m12', label:'初中 1-2 年级', age:'13-14岁', desc:'能思考因果关系和社会影响' },
  { id:'h', label:'高中及以上', age:'15岁+', desc:'具备较成熟的系统思维' },
];

// ═══ State ═══
const STATE = {
  phase: 0, // 0=categories, 1=resolve, 2=questions, 3=research, 4=features, 5=prd, 6=tech
  ageGroup: null,
  cats: [],
  userAnswers: [],  // answers to ai-generated questions
  researchNotes: '',
  selectedFeatures: [],
  prdText: '',
  techText: '',
  allContext: {}, // accumulated context for AI prompts
};
const PHASES = ['选方向','思辨问答','资料调研','功能选择','生成PRD','编程任务'];

// ═══ Render ═══
const main = document.getElementById('mainContent');

function buildPhaseBar() {
  document.getElementById('phaseBar').innerHTML = PHASES.map((_,i) => {
    let cls = ''; if (i < STATE.phase) cls = 'done'; else if (i === STATE.phase) cls = 'active';
    return `<div class="phase-dot ${cls}"></div>`;
  }).join('');
}

function showToast(msg) {
  const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t); setTimeout(() => t.remove(), 1900);
}

function btn(text, cls, onclick, disabled) {
  return `<button class="btn ${cls}" onclick="${onclick}" ${disabled?'disabled':''}>${text}</button>`;
}

// ═══ Pre-start: Age selection ═══
function renderAgeSelect() {
  buildPhaseBar();
  main.innerHTML = `
    <div class="msg msg-ai">
      <div class="avatar">👋</div>
      <div class="bubble">
        <strong>开始前，先告诉小P你读几年级？</strong><br>
        这样小P 才能出适合你的思考题。
      </div>
    </div>
    <div class="choice-list" style="margin-top:16px;">${AGE_GROUPS.map(g => `
      <div class="choice-card" onclick="selectAgeGroup('${g.id}')">
        <div class="choice-dot"></div>
        <div class="choice-text">
          <strong>${g.label}</strong>
          <span style="color:var(--text-light);font-size:12px;display:block;">${g.age}</span>
        </div>
      </div>
    `).join('')}</div>
  `;
  saveState();
}

function selectAgeGroup(id) {
  STATE.ageGroup = AGE_GROUPS.find(g => g.id === id);
  STATE.allContext.ageGroup = STATE.ageGroup.label;
  renderPhase0();
}

// ═══ Phase 0: Category Selection ═══
function renderPhase0() {
  buildPhaseBar();
  main.innerHTML = `
    <div class="msg msg-ai">
      <div class="avatar">🤖</div>
      <div class="bubble">
        <strong>第一步：你想做一个什么样的网站？</strong><br>
        下面有 12 个方向，选 <strong>1~2 个</strong>你真正关心的方向。<br>
        这个产品会是一个网页应用，帮人解决学校、社区或网络社群里的真实问题。
      </div>
    </div>
    <div style="text-align:center;margin-bottom:12px;">
      <span style="display:inline-block;background:#f3e8ff;color:var(--purple);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;">当前年级：${STATE.ageGroup?.label || '未选择'}</span>
      <a href="javascript:void(0)" onclick="renderAgeSelect()" style="font-size:12px;color:var(--blue);margin-left:8px;">修改</a>
    </div>
    <div class="cat-count">已选 <strong id="catCount">0</strong> / 2</div>
    <div class="cat-grid" id="catGrid"></div>
    <div class="btn-group">
      ${btn('✨ 确认选择，进入下一步', 'btn-primary', 'confirmPhase0()', STATE.cats.length === 0)}
    </div>
  `;
  const grid = document.getElementById('catGrid');
  CATS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'cat-card' + (STATE.cats.includes(c.id) ? ' selected' : '');
    d.dataset.id = c.id;
    d.innerHTML = `<span class="ci">${c.icon}</span><span class="cn">${c.name}</span>`;
    d.onclick = () => toggleCat(c.id);
    grid.appendChild(d);
  });
  updateCatUI();
  saveState();
}

function toggleCat(id) {
  const i = STATE.cats.indexOf(id);
  if (i >= 0) STATE.cats.splice(i, 1);
  else if (STATE.cats.length < 2) STATE.cats.push(id);
  else { showToast('最多选 2 个'); return; }
  renderPhase0();
}

function updateCatUI() {
  const grid = document.getElementById('catGrid');
  if (!grid) return;
  grid.querySelectorAll('.cat-card').forEach(c => {
    c.classList.toggle('selected', STATE.cats.includes(c.dataset.id));
    if (STATE.cats.length >= 2 && !STATE.cats.includes(c.dataset.id)) c.classList.add('disabled');
    else c.classList.remove('disabled');
  });
}

function confirmPhase0() {
  if (STATE.cats.length === 0) { showToast('请至少选一个方向'); return; }
  STATE.allContext.cats = STATE.cats.map(id => CATS.find(c => c.id === id).name).join('、');
  STATE.phase = 1;
  renderPhase1Start();
}

// ═══ Phase 1: AI generates questions ═══
async function renderPhase1Start() {
  buildPhaseBar();
  // Check API key
  if (!hasApiKey()) {
    main.innerHTML = `<div class="msg msg-ai"><div class="avatar">🤖</div><div class="bubble">接下来的步骤需要 AI 辅助。请先配置 API Key。<br>${btn('🔑 配置 API Key', 'btn-ai', 'showApiModal()')}</div></div>`;
    return;
  }
  main.innerHTML = `<div class="loading"><span class="spinner">⚙️</span><p>小P 正在根据你的方向「${STATE.allContext.cats}」出思考题……</p></div>`;

  try {
    const prompt = `你是一位面向${STATE.ageGroup?.label || '中小学生'}的产品思辨引导老师。学生最终要设计的是一个**网页应用**（不是硬件发明、不是实体产品）。

学生选了兴趣方向：${STATE.allContext.cats}。

请生成第 1 道引导式选择题，帮助学生缩小范围——在他们选的方向中，**更具体地想做一个什么类型的网站/网页应用**？

要求：
- 给 3 个选项（用A/B/C标记）
- 每个选项都必须是一个**网页应用能解决的问题或提供的服务**，例如：信息查询、打卡记录、方案设计、知识分享、互助匹配、数据展示、教程指南等
- 场景可以发生在学校、居住社区或网络兴趣社群中
- 选项要具体、有真实感，贴近${STATE.ageGroup?.label || '学生'}的生活
- 每道题的选项是互斥的（只能选一个）
- 避免出现「硬件」「机器人」「实物装置」「传感器」等不适合网页应用的描述

格式严格如下：
题1：题目标题
A：选项描述
B：选项描述
C：选项描述

注意：选项是互斥的，只能选一个。`;

    const result = await callAI(prompt);
    const qs = parseQuestions(result);
    STATE.questions = qs.slice(0, 1);
    STATE.userAnswers = [];
    STATE.questionIdx = 0;
    renderQuestion();
  } catch (e) {
    main.innerHTML = `<div class="msg msg-ai"><div class="avatar">😢</div><div class="bubble">生成思考题失败：${e.message}<br>${btn('🔄 重试', 'btn-outline', 'renderPhase1Start()')}</div></div>`;
  }
}

function parseQuestions(text) {
  const qs = [];
  const regex = /题\s*\d+\s*[：:]([\s\S]*?)(?=题\s*\d+\s*[：:]|$)/g;
  let m;
  while ((m = regex.exec(text)) !== null) {
    const body = m[1].trim();
    const lines = body.split('\n').filter(l => l.trim());
    const title = lines[0] || '';
    const opts = [];
    for (let i = 1; i < lines.length; i++) {
      const om = lines[i].match(/^([A-C])[\.\、\s：:]*\s*(.+)/);
      if (om) opts.push({ key: om[1], text: om[2].trim() });
    }
    if (title && opts.length > 0) qs.push({ title, opts });
  }
  // fallback
  if (qs.length === 0) {
    const parts = text.split(/\n{2,}/).filter(p => p.trim());
    parts.forEach(part => {
      const lines = part.split('\n').filter(l => l.trim());
      const title = lines[0] || '请选择一个选项';
      const opts = [];
      for (let i = 1; i < lines.length; i++) {
        const om = lines[i].match(/^([A-C])[\.\、\s：:]*\s*(.+)/);
        if (om) opts.push({ key: om[1], text: om[2].trim() });
      }
      if (opts.length > 0) qs.push({ title, opts });
    });
  }
  return qs.slice(0, 5);
}

    task: taskM ? taskM[1].trim() : '请搜索相关资料',
    keywords: kwM ? kwM[1].split(/[,，\n]/).map(k => k.trim()).filter(k => k) : [],

- 思考深度（0-3分）：是否有自己的观察、对比或分析？

请按${STATE.ageGroup?.label || '学生'}水平评价，不要以大学生或专业研究者标准要求。

评语：（一句话）

    const result = await callAI(prompt);
    const scoreM = result.match(/得分[：:]\s*(\d+)/);

  }

  }
}

function parseFeaturePhase(text) {
  const featM = text.match(/\[功能选择题\]([\s\S]*?)(?=\[核心|$)/i);
  const coreM = text.match(/\[核心问题确认题\]([\s\S]*?)$/i);
  const features = [];
  if (featM) {
    const lines = featM[1].split('\n');
    for (const l of lines) {
      const fm = l.match(/^\s*\[(P\d)\]\s*(.+)$/i);
      if (fm) features.push({ priority: fm[1], text: fm[2].trim() });
    }
  }
  const coreOpts = [];
  if (coreM) {
    const lines = coreM[1].split('\n');
    for (const l of lines) {
      const cm = l.match(/^([A-C])[\.\、\s：:]*\s*(.+)/);
      if (cm) coreOpts.push({ key: cm[1], text: cm[2].trim() });
    }
  }
  return { features, coreOpts };
}

  };

  main.innerHTML = `
    <div class="msg msg-ai">
      <div class="avatar">📋</div>
      <div class="bubble">
        <strong>回顾总结</strong><br>

// ═══ Phase 4: Generate PRD ═══
async function renderPhase4() {
  buildPhaseBar();
  main.innerHTML = `<div class="loading"><span class="spinner">📝</span><p>小P 正在根据你的所有思考生成 PRD 文档……</p></div>`;

  try {
    const prompt = `请根据以下信息，生成一份适合${STATE.ageGroup?.label || '中小学生'}看的简短 PRD。

【年级】${STATE.ageGroup?.label || '中小学'}
【方向】${STATE.allContext.cats}
【思考与回答】${STATE.allContext.answers}
【调研资料】${STATE.allContext.research || '（无）'}
【核心问题】${STATE.allContext.coreAnswer || '（无）'}
【选定功能】${STATE.allContext.features || '（无）'}
${STATE.designOverall ? `【设计评价】总评：${STATE.designOverall}` : ''}

这是一款面向${STATE.ageGroup?.label || '学生'}的网页应用。请按照下面格式输出 PRD：

## 一、这个产品是什么？
- 一句话说清：这个网站帮谁解决什么问题
- 它像什么：用一个生活中的东西做比喻

## 二、谁会用它？
- 主要用户：年龄、身份、特点
- 用户在什么情况下会打开这个网页？

## 三、功能
- 列出学生选定的所有功能，按 P0/P1/P2 排列
- 每个功能一句话说清

## 四、用户怎么用？
- 从打开网页到完成操作的完整流程
- 3-5 个步骤

要求：
- **必须体现学生自己的回答、调研发现和改进思考**，不能写学生没思考过的内容
- **每个学生提到的功能都要写**，不限于「最重要的 3 个」
- 字数根据功能数量弹性变化：如果只有 3 个功能就 400-800 字；如果功能多就 800-2000 字
- 用词适合${STATE.ageGroup?.label || '学生'}，但内容要有实质信息
- 不要表格、不要流程图、不要 Markdown 加粗`; 

    const result = await callAI(prompt, MODEL_PRO);
    STATE.prdText = result;
    renderPRDResult();
  } catch (e) {
    main.innerHTML = `<div class="msg msg-ai"><div class="avatar">😢</div><div class="bubble">生成 PRD 失败：${e.message}<br>${btn('🔄 重试', 'btn-outline', 'renderPhase4()')}</div></div>`;

function renderPRDResult() {
  buildPhaseBar();
  if (!STATE.prdText) { renderPhase4(); return; }
  main.innerHTML = `
    <div class="msg msg-ai">
      <div class="avatar">📝</div>
      <div class="bubble"><strong>PRD 文档已生成！</strong><br>下面是你基于深度思考产出的产品需求文档。</div>
    </div>
    <div class="result-block" id="prdResultBlock">
      <div class="body" id="prdBody">${marked.parse(STATE.prdText)}</div>
      <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;">
        ${btn('📋 复制 PRD', 'btn-copy btn-small', 'copyText(STATE.prdText, this)')}
        ${btn('✏️ 编辑 PRD', 'btn-outline btn-small', 'enablePrdEdit()')}
      </div>
    </div>
    <div class="btn-group">
      ${btn('← 返回修改', 'btn-outline', 'backToFeatures()')}
      ${btn('🚀 生成编程任务', 'btn-primary', 'renderPhase5()')}
    </div>
  `;
  saveState();
}

function enablePrdEdit() {
  const block = document.getElementById('prdResultBlock');
  block.innerHTML = `
    <textarea class="text-input" id="prdEditInput" style="min-height:300px;font-family:inherit;font-size:14px;line-height:1.8;">${escapeHtml(STATE.prdText)}</textarea>
    <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;">
      ${btn('💾 保存修改', 'btn-primary btn-small', 'savePrdEdit()')}
      ${btn('↩ 取消', 'btn-outline btn-small', 'renderPRDResult()')}
    </div>
  `;
}

function savePrdEdit() {
  const input = document.getElementById('prdEditInput');
  const newText = input.value.trim();
  if (!newText) { showToast('PRD 不能为空'); return; }
  STATE.prdText = newText;
  showToast('✅ PRD 已保存');
  saveState();
  renderPRDResult();
}

function escapeHtml(text) {
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function backToFeatures() { STATE.phase = 3; renderFeatureUI(); }

// ═══ Phase 5: Step-by-step Coding Prompts ═══
async function renderPhase5() {
  STATE.phase = 5;
  buildPhaseBar();
  if (!STATE.prdText) { renderPhase4(); return; }
  main.innerHTML = `<div class="loading"><span class="spinner">🔨</span><p>小P 正在把 PRD 拆成一步步的编程任务……</p></div>`;

  try {
    const prompt = `你是一位编程老师，正在教${STATE.ageGroup?.label || '小/初中生'}把产品需求变成代码。

请根据以下 PRD，生成一份「分步编程任务清单」。

PRD 内容：
${STATE.prdText}

【明确要求】
1. 先从 PRD 中提取所有功能，每个功能必须对应一个编程步骤
2. 然后增加 2 个通用步骤：步骤1 = HTML 页面骨架搭建，步骤2 = CSS 样式美化
3. 所以总步骤数 = 功能数量 + 2
4. 如果 PRD 中功能少于 3 个，也要生成最少 5 个步骤（把大功能拆细）
5. 每个步骤包含：
   - 步骤编号 + 标题（标题里要出现该功能或主题的名字）
   - 要做什么：用简单的语言描述，适合${STATE.ageGroup?.label || '学生'}理解
   - 提示词：一段可以直接复制给 AI 编程工具的提示词，约2-4句话
   - 尝试修改：一个挑战问题，鼓励学生改一改代码
6. 步骤顺序：先 HTML 骨架 → 再 CSS 美化 → 然后按使用顺序做每个功能的 JS 交互
7. 技术栈：纯 HTML/CSS/JS，不涉及后端和数据库
8. 提示词要短小精悍，学生复制过去 AI 就能写出可运行的代码

【格式要求 - 必须严格遵守】
每个步骤之间用单独一行的 --- 隔开。每个步骤必须包含「步骤N：」「要做什么：」「提示词：」「尝试修改：」四个字段。

步骤1：搭建HTML页面骨架
要做什么：创建网页的基本结构，包括标题、输入框、按钮等占位元素
提示词：请帮我用HTML创建一个简单的网页，包含一个标题、一段说明文字、一个输入框和一个按钮
尝试修改：把标题改成你喜欢的名字

---
步骤2：添加CSS样式
要做什么：给HTML元素添加颜色、间距、边框等样式，让页面好看
提示词：请为上面的HTML添加CSS样式，让页面背景是浅紫色，按钮是圆角，文字居中显示
尝试修改：把按钮颜色改成你喜欢的颜色

---
步骤3：实现XXX功能
要做什么：...
提示词：...
尝试修改：...

---`;

    const result = await callAI(prompt, MODEL_PRO);
    let steps = parseSteps(result);
    // Validation: ensure minimum 5 steps
    if (steps.length < 5) {
      showToast(`⚠️ 只生成了 ${steps.length} 步，正在补充步骤……`);
      // Retry once with stronger emphasis
      const retryPrompt = prompt + '\n\n【重要提醒】你刚才只生成了 ' + steps.length + ' 步，请重新生成，确保至少有 5 个步骤，每个 PRD 功能都要有对应步骤。';
      const retryResult = await callAI(retryPrompt, MODEL_PRO);
      const retrySteps = parseSteps(retryResult);
      if (retrySteps.length > steps.length) steps = retrySteps;
    }
    STATE.techSteps = steps;
    renderStepResult();
  } catch (e) {
    main.innerHTML = `<div class="msg msg-ai"><div class="avatar">😢</div><div class="bubble">生成失败：${e.message}<br>${btn('🔄 重试', 'btn-outline', 'renderPhase5()')}</div></div>`;
  }
}

function parseSteps(text) {
  const steps = [];
  const parts = text.split(/---+/);
  for (const part of parts) {
    const p = part.trim();
    if (!p) continue;
    const titleM = p.match(/步骤\s*\d+\s*[：:]\s*(.+)/);
    const whatM = p.match(/要做什么\s*[：:]\s*([\s\S]*?)(?=提示词\s*[：:]|$)/);
    const promptM = p.match(/提示词\s*[：:]\s*([\s\S]*?)(?=尝试修改\s*[：:]|$)/);
    const tryM = p.match(/尝试修改\s*[：:]\s*([\s\S]*?)$/);
    if (titleM) {
      steps.push({
        title: titleM[1].trim(),
        what: whatM ? whatM[1].trim() : '',
        prompt: promptM ? promptM[1].trim() : '',
        tryit: tryM ? tryM[1].trim() : '试试把你的创意加进去！'
      });
    }
  }
  return steps;
}

function renderStepResult() {
  buildPhaseBar();
  const steps = STATE.techSteps;
  if (!steps || steps.length === 0) { renderPhase5(); return; }

  main.innerHTML = `
    <div class="msg msg-ai">
      <div class="avatar">🔨</div>
      <div class="bubble">
        <strong>编程任务清单已生成！</strong><br>
        下面是一步一步的编程任务。<strong>你才是主角</strong>——每个步骤都看懂、改一改，再让 AI 帮你写。
      </div>
    </div>
    <div class="btn-group">
      ${btn('📋 复制全部任务', 'btn-copy', 'copyAllSteps()')}
      ${btn('← 返回 PRD', 'btn-outline', 'renderPRDResult()')}
      ${btn('🔄 重新开始', 'btn-outline', 'resetAll()')}
    </div>
    ${steps.map((s, i) => `
      <div class="result-block" style="border-left:4px solid var(--purple);">
        <h2 style="display:flex;align-items:center;gap:8px;">
          <span style="background:linear-gradient(135deg, var(--pink), var(--purple));color:#fff;width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:14px;">${i+1}</span>
          ${s.title}
        </h2>
        <div style="margin:10px 0;">
          <strong style="color:var(--purple);">📌 要做什么：</strong>
          <p style="margin:4px 0 10px;font-size:14px;">${s.what}</p>
        </div>
        <div style="background:#f8f0ff;border-radius:12px;padding:12px 14px;margin:8px 0;">
          <strong style="color:var(--purple);">💬 提示词（复制给 AI）：</strong>
          <p style="margin:6px 0 0;font-size:13px;line-height:1.8;white-space:pre-wrap;">${s.prompt}</p>
          ${btn('📋 复制这段提示词', 'btn-copy btn-small', `copyStepPrompt(${i}, this)`, false)}
        </div>
        <div style="background:#fffde7;border-radius:12px;padding:12px 14px;margin:8px 0;border:1px dashed #ffe082;">
          <strong style="color:var(--orange);">🎯 试试修改：</strong>
          <p style="margin:4px 0 0;font-size:14px;">${s.tryit}</p>
        </div>
      </div>
    `).join('')}
  `;
  window._techSteps = steps;
  saveState();
}

function copyStepPrompt(i, btn) {
  const t = window._techSteps[i].prompt;
  copyToClipboard(t);
  if (btn) { btn.textContent = '✅ 已复制'; setTimeout(() => btn.textContent = '📋 复制这段提示词', 2000); }
  showToast('✅ 提示词已复制！去粘贴给 AI 吧');
}
function copyAllSteps() {
  const all = window._techSteps.map((s, i) =>
    `【第${i+1}步】${s.title}\n要做什么：${s.what}\n\n提示词：${s.prompt}\n\n尝试修改：${s.tryit}`
  ).join('\n\n---\n\n');
  copyToClipboard(all);
  showToast('✅ 全部任务已复制！');
}
async function copyText(text, btn) {
  await copyToClipboard(text);
  if (btn) { btn.textContent = '✅ 已复制'; setTimeout(() => btn.textContent = '📋 复制', 2000); }
}
async function copyToClipboard(text) {
  try { await navigator.clipboard.writeText(text); }
  catch { const ta = document.createElement('textarea'); ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }
}

// ═══ API Key Modal ═══
function showApiModal() {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;';
  overlay.innerHTML = `
    <div style="background:#fff;border-radius:20px;padding:28px;max-width:440px;width:100%;text-align:center;position:relative;">
      <button onclick="this.parentElement.parentElement.remove()" style="position:absolute;top:12px;right:16px;width:28px;height:28px;border-radius:50%;border:none;background:#f0f0f0;font-size:14px;cursor:pointer;">✕</button>
      <div style="font-size:40px;margin-bottom:10px;">🔑</div>
      <h2>配置 API Key</h2>
      <p style="font-size:13px;color:#636e72;margin:8px 0 16px;">去 platform.deepseek.com 获取 Key</p>
      <input type="password" id="apiKeyModalInput" placeholder="sk-xxxxxxxx" style="width:100%;padding:12px;border:2px solid #e8e8e8;border-radius:12px;font-size:14px;font-family:monospace;margin-bottom:12px;">
      <p id="apiErr" style="color:#ff6b6b;font-size:12px;margin-bottom:8px;display:none;">Key 格式不正确</p>
      <button class="btn btn-primary" onclick="saveApiKey()">保存并继续</button>
      <p style="font-size:11px;color:#aaa;margin-top:8px;">仅保存在你当前浏览器中</p>
    </div>
  `;
  document.body.appendChild(overlay);
}

function saveApiKey() {
  const input = document.getElementById('apiKeyModalInput');
  const val = input.value.trim();
  if (!val.startsWith('sk-')) { document.getElementById('apiErr').style.display = 'block'; return; }
  setApiKey(val);
  document.querySelector('[style*="z-index:9999"]')?.remove();
  showToast('✅ 已保存');
  if (STATE.phase === 1) renderPhase1Start();
}

// ═══ Reset ═══
function resetAll() {
  clearSavedState();
  STATE.phase = 0; STATE.ageGroup = null; STATE.cats = []; STATE.userAnswers = []; STATE.researchNotes = '';
  STATE.selectedFeatures = []; STATE.prdText = ''; STATE.techSteps = []; STATE.allContext = {};
  STATE.questions = []; STATE.questionIdx = 0; STATE.coreAnswer = null;
  STATE.designScores = null; STATE.designOverall = null; STATE._improvedDims = new Set();
  window._featData = []; window._selFeat = new Set(); window._techSteps = [];
  renderAgeSelect();
}

// ═══ Test backdoor: click brain icon to skip current check ═══
function brainBackdoor() {
  showToast('🧠 测试后门：跳过检查');
  if (STATE.phase === 3 && document.querySelector('.result-block')) {
    skipResearchEval();
  }
}

// ═══ Start ═══
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('brainIcon').addEventListener('click', brainBackdoor);
  if (loadState() && STATE.ageGroup) {
    showToast('✅ 已恢复上次进度');
    // Route to the saved phase
    if (STATE.phase === 0) renderPhase0();
    else if (STATE.phase === 1) renderQuestion();
    else if (STATE.phase === 2) renderResearchUI();
    else if (STATE.phase === 3) renderFeatureUI();
    else if (STATE.phase === 4) {
      if (STATE.reviewSummary) renderReviews();
      else renderDesignEval();
    }
    else if (STATE.phase === 5) renderPRDResult();
    else if (STATE.phase === 6) renderStepResult();
    else renderAgeSelect();
  } else {
    renderAgeSelect();
  }
});
</script>
